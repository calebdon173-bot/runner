name: Build and Rotate Runner Image
on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
             CACHE_DATE=$(date +%Y-%m-%d_%H-%M-%S)
          tags: |
            ghcr.io/${{ github.repository }}/custom-runner:latest
            ghcr.io/${{ github.repository }}/custom-runner:slim
            ghcr.io/${{ github.repository }}/custom-runner:${{ github.sha }}
