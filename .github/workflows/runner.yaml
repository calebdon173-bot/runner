name: Build and Rotate Runner Image

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          # Passing a fresh timestamp breaks the cache for apt-get upgrade
          docker build \
            --build-arg CACHE_DATE=$(date +%Y-%m-%d_%H-%M-%S) \
            -t ghcr.io/${{ github.repository }}/custom-runner:latest \
            -t ghcr.io/${{ github.repository }}/custom-runner:slim .

      - name: Push Docker images
        run: |
          # We tag both so your other workflows don't need a YAML change
          docker push ghcr.io/${{ github.repository }}/custom-runner:latest
          docker push ghcr.io/${{ github.repository }}/custom-runner:slim
